approvals_reviewer = "guardian_subagent"
model = "gpt-5.5"
model_reasoning_effort = "high"

[tui.model_availability_nux]
"gpt-5.5" = 2

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[projects."/home/simon/dotfiles"]
trust_level = "trusted"

[projects."/home/simon/dev"]
trust_level = "trusted"

[features]
codex_hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5

[[hooks.PreToolUse]]
matcher = "*"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5

[[hooks.PermissionRequest]]
matcher = "*"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5

[[hooks.PostToolUse]]
matcher = "*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "sh -c 'csm-reporter --agent codex || true'"
timeout = 5
