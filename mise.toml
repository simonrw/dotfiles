[tasks.all]
description = "Install/link packages"
depends = [
    "dotfiles",
    "gh-extensions",
    "vim-update",
    "mise:packages",
    "bat-cache",
    "skills",
    "codex:config",
    "zed:config",
]
depends_post = ["brew"]

[tasks.submodules]
description = "Initialize git submodules"
run = "git submodule update --init --recursive"

[tasks."mise:packages"]
description = "Install global mise packages"
depends = ["dotfiles"]
run = "cd $HOME && mise install"

[tasks.dotfiles]
description = "Install dotfiles"
depends = ["submodules"]
run = """
if [ "$(uname)" = "Linux" ]; then
  stow --ignore='^Library' --ignore='^\\.hammerspoon' .
else
  stow --ignore='^\\.config/systemd' --ignore='^\\.config/fontconfig' --ignore='^\\.config/xdg-desktop-portal' --ignore='^\\.local' --ignore='^\\.config/waybar' --ignore='^\\.config/hypr' --ignore='^\\.config/sway' .
fi
ln -sf "$(pwd)/.config/ghostty/$(hostname -s).config" "$HOME/.config/ghostty/local.config"
"""

[tools]
go = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
lua-language-server = "latest"
ruff = "latest"
ty = "latest"

[tasks."brew:upgrade"]
run = "brew update && brew upgrade"
description = "Update brews"

[tasks."brew:mas"]
description = "Install Mac App Store packages from Brewfile.mas"
run = """
if [[ $(uname -s) != "Darwin" ]]; then
  exit 0
fi

HOMEBREW_NO_AUTO_UPDATE=1 brew bundle --file Brewfile.mas --no-upgrade
"""

[tasks."apt:upgrade"]
run = "sudo bash -c 'apt update && sudo apt upgrade'"
description = "Update apt packages"

[tasks.vim-update]
run = "NVIM_VIM_UPDATE=1 nvim --headless"
description = "Update neovim packages"

[tasks.bat-cache]
run = "bat cache --build"
description = "Refresh the bat syntax theme cache"

[tasks.kill-nvim]
run = "pkill nvim || true"
description = "Close all running instances of neovim"

[tasks.nvim-nightly-update]
run = "bob update nightly"
description = "Update to the latest neovim nightly"
depends = ["kill-nvim"]

[tasks.nvim-stable-update]
run = "bob update stable"
description = "Update to the latest neovim stable build"
depends = ["kill-nvim"]

[bootstrap.macos.dock]
autohide = true
orientation = "bottom"
tilesize = 28
magnification = true
largesize = 92
mru_spaces = false

[bootstrap.macos.finder]
show_pathbar = true
show_extensions_warning = false
preferred_view_style = "list"

[bootstrap.macos.keyboard]
key_repeat = 2
press_and_hold = false

[bootstrap.macos.defaults]
NSGlobalDomain = { AppleICUForce24HourTime = true, NSWindowShouldDragOnGesture = true, "com.apple.mouse.scaling" = -1.0, NSToolbarTitleViewRolloverDelay = 0, NSMenuEnableActionImages = false, NSGlassDiffusionSetting = 0 }
"com.apple.dock" = { "show-process-indicators" = false, showhidden = false }
"com.apple.finder" = { AppleShowAllExtensions = false, FXDefaultSearchScope = "SCcf", _FXShowPosixPathInTitle = true }
"com.apple.screencapture" = { location = "~/Pictures/screenshots" }

[bootstrap.macos.launchd.agents.t3-code]
program = "/opt/homebrew/bin/mise"
args = ["exec", "node", "npm:t3@nightly", "--", "t3"]
run_at_load = true
working_directory = "~"
stdout_path = "~/Library/Logs/t3-code.log"
stderr_path = "~/Library/Logs/t3-code.err.log"
keep_alive = true
environment = { PATH = "/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin" }
