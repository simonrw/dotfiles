post-remove = "session=\"$(~/.bin/zmx-session-name \"{{ repo }}\" \"{{ branch | sanitize }}\")\"; zmx kill \"$session\" --force 2>/dev/null || true"
pre-start = "session=\"$(~/.bin/zmx-session-name \"{{ repo }}\" \"{{ branch | sanitize }}\")\"; cd '{{ worktree_path }}' && zmx attach \"$session\""

[commit.generation]
command = "MAX_THINKING_TOKENS=0 claude -p --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

[projects]
