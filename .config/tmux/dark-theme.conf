set -g @sidebar_color_idle "#a6adc8"
set -g @sidebar_color_error "#f38ba8"
set -g @sidebar_color_filter_inactive "#6c7086"
set -g @sidebar_color_agent_claude "#fab387"
set -g @sidebar_color_agent_codex "#cba6f7"
set -g @sidebar_color_agent_opencode "#89dceb"
set -g @sidebar_color_text_active "#cdd6f4"
set -g @sidebar_color_text_muted "#a6adc8"
set -g @sidebar_color_text_inactive "#6c7086"
set -g @sidebar_color_session "#89b4fa"
set -g @sidebar_color_port "#6c7086"
set -g @sidebar_color_wait_reason "#f9e2af"
set -g @sidebar_color_selection "#313244"
set -g @sidebar_color_branch "#94e2d5"
set -g @sidebar_color_task_progress "#fab387"
set -g @sidebar_color_subagent "#94e2d5"
