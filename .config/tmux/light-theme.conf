# vim: ft=tmux
# rosé pine dawn
fg_colour="#286983"
bg_colour="default"
status_format_colour="#797593"

set -g message-style "fg=$fg_colour,bg=$bg_colour"
set -g message-command-style "fg=$fg_colour,bg=$bg_colour"

set -g pane-border-style "fg=#dfdad9"
set -g pane-active-border-style "fg=$fg_colour"

set -g status-style "fg=$fg_colour,bg=$bg_colour"
set -g status-bg "$bg_colour"

set -g status-left "#[fg=$fg_colour,bold]#S ▶  "
set -g status-right "  #[fg=$fg_colour,bold]◀ #h"

setw -g window-status-activity-style "underscore,fg=#575279,bg=$bg_colour"
setw -g window-status-style "fg=$status_format_colour,bg=$bg_colour,nobold"
setw -g window-status-current-style "fg=#907aa9,bg=$bg_colour,nobold"
setw -g window-status-format "#{?window_zoomed_flag,#[fg=#ea9d34],#[fg=$status_format_colour]} #I:#{?window_name,#{window_name},#{pane_current_command}} #[fg=$status_format_colour]"
setw -g window-status-current-format "#{?window_zoomed_flag,#[fg=#ea9d34],#[fg=#907aa9]} #I:#{?window_name,#{window_name},#{pane_current_command}} #[fg=#907aa9]"
