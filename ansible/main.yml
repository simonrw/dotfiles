---
- name: Install dependencies
  hosts: localhost
  vars_files:
    - packages.yml
    - vars.yml
  tasks:

    - name: Verify become password
      become: true
      ansible.builtin.command: /bin/true
      changed_when: false

    - name: Setup target user
      ansible.builtin.include_tasks: user.yml

    - name: Ensure /etc/apt/keyrings directory exists
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add APT keys
      become: true
      get_url:
        url: "{{ item.url }}"
        dest: "{{ item.keyring }}"
        mode: '0644'
      loop: "{{ apt_keys | default([]) }}"

    - name: Normalize managed APT source files
      become: true
      ansible.builtin.copy:
        dest: "/etc/apt/sources.list.d/{{ item.filename }}.list"
        content: "{{ item.repo }}\n"
        mode: '0644'
      loop: "{{ apt_repositories | default([]) }}"
      when: item.managed_source_file | default(false)

    - name: Add APT repositories
      become: true
      apt_repository:
        repo: "{{ item.repo }}"
        filename: "{{ item.filename }}"
        state: present
      loop: "{{ apt_repositories | default([]) }}"

    - name: Setup 1Password CLI
      ansible.builtin.include_tasks: 1password.yml

    - name: Setup Hyprland
      ansible.builtin.include_tasks: hyprland.yml

    - name: Setup Sway
      ansible.builtin.include_tasks: sway.yml

    - name: Install packages
      become: true
      apt:
        name: "{{ packages }}"
        state: present
        update_cache: yes

    - name: Configure networking
      ansible.builtin.include_tasks: network.yml

    - name: Configure unattended-upgrades
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Install snaps
      become: true
      community.general.snap:
        name: "{{ snaps }}"

    - name: Install classic snaps
      become: true
      community.general.snap:
        name: "{{ item }}"
        classic: true
      loop: "{{ classic_snaps | default([]) }}"

    - name: Setup Ghostty
      ansible.builtin.include_tasks: ghostty.yml

    - name: Setup Sunshine
      ansible.builtin.include_tasks: sunshine.yml

    - name: Setup Helium
      ansible.builtin.include_tasks: helium.yml

    - name: Install Lilex font
      ansible.builtin.include_tasks: font.yml
      vars:
        font_name: Lilex
        font_url: "https://github.com/mishamyrt/Lilex/releases/download/{{ lilex_version }}/Lilex.zip"

    - name: Setup Ollama
      ansible.builtin.include_tasks: ollama.yml
      when: ansible_hostname == 'astoria'

    - name: Apply dconf settings
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
      loop: "{{ dconf_settings | default([]) }}"

    - name: Setup Zed
      ansible.builtin.include_tasks: zed.yml

    - name: Enable x11vnc systemd user service
      ansible.builtin.systemd:
        name: x11vnc.service
        enabled: true
        scope: user
        daemon_reload: true

    - name: Install Claude Code
      ansible.builtin.include_tasks: claude-code.yml

  handlers:
    - name: Load Helium AppArmor profile
      become: true
      ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/helium-appimage

    - name: Restart ollama
      become: true
      ansible.builtin.systemd:
        name: ollama
        state: restarted
        daemon_reload: true
