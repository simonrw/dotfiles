---
- name: Install dependencies
  hosts: localhost
  vars_files:
    - packages.yml
    - vars.yml
  tasks:

    - name: Verify become password
      become: true
      ansible.builtin.command: /bin/true
      changed_when: false

    - name: Resolve target user
      ansible.builtin.set_fact:
        ansible_target_user: "{{ dotfiles_user_name | default(ansible_facts.user_id, true) }}"

    - name: Read target user account
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_target_user }}"

    - name: Resolve target user home
      ansible.builtin.set_fact:
        ansible_target_home: "{{ dotfiles_user_home | default(ansible_facts.getent_passwd[ansible_target_user][4], true) }}"

    - name: Resolve profile for this host
      ansible.builtin.set_fact:
        dotfiles_profile: "{{ host_profiles.get(ansible_facts.hostname, default_profile) }}"

    - name: Resolve package lists for this profile
      ansible.builtin.set_fact:
        resolved_packages: "{{ package_profiles.get(dotfiles_profile, {}).get('apt', []) }}"
        resolved_snaps: "{{ package_profiles.get(dotfiles_profile, {}).get('snaps', []) }}"
        resolved_classic_snaps: "{{ package_profiles.get(dotfiles_profile, {}).get('classic_snaps', []) }}"

    - name: Ensure /etc/apt/keyrings directory exists
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Normalize legacy mise APT source keyring
      become: true
      ansible.builtin.shell:
        cmd: |
          set -eu
          files="$(grep -rl 'https://mise.jdx.dev/deb' /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null || true)"
          [ -n "$files" ] || exit 0
          grep -q '/etc/apt/keyrings/mise-archive-keyring.pub' $files || exit 0
          sed -i 's#/etc/apt/keyrings/mise-archive-keyring.pub#/etc/apt/keyrings/mise.gpg#g' $files
      changed_when: false

    - name: Install APT repository prerequisites
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add APT keys
      become: true
      ansible.builtin.shell:
        cmd: "curl -fsSL {{ item.url | quote }} | gpg --dearmor --yes --output {{ item.keyring | quote }}"
      loop: "{{ apt_keys | default([]) }}"
      changed_when: false

    - name: Set APT key permissions
      become: true
      ansible.builtin.file:
        path: "{{ item.keyring }}"
        mode: '0644'
      loop: "{{ apt_keys | default([]) }}"

    - name: Add APT repositories
      become: true
      apt_repository:
        repo: "{{ item.repo }}"
        filename: "{{ item.filename }}"
        state: present
      loop: "{{ apt_repositories | default([]) }}"

    - name: Setup 1Password CLI
      ansible.builtin.include_tasks: 1password.yml

    - name: Setup Hyprland
      ansible.builtin.include_tasks: hyprland.yml

    - name: Setup Sway
      ansible.builtin.include_tasks: sway.yml

    - name: Install packages
      become: true
      apt:
        name: "{{ resolved_packages }}"
        state: present
        update_cache: yes
      when: resolved_packages | length > 0

    - name: Setup target user
      ansible.builtin.include_tasks: user.yml

    - name: Configure unattended-upgrades
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Install snaps
      become: true
      community.general.snap:
        name: "{{ resolved_snaps }}"
      when: resolved_snaps | length > 0

    - name: Install classic snaps
      become: true
      community.general.snap:
        name: "{{ item }}"
        classic: true
      loop: "{{ resolved_classic_snaps }}"

    - name: Setup Ghostty
      ansible.builtin.include_tasks: ghostty.yml
      when: dotfiles_profile == 'desktop'

    - name: Setup Helium
      ansible.builtin.include_tasks: helium.yml
      when: dotfiles_profile == 'desktop'

    - name: Install Lilex font
      ansible.builtin.include_tasks: font.yml
      vars:
        font_name: Lilex
        font_url: "https://github.com/mishamyrt/Lilex/releases/download/{{ lilex_version }}/Lilex.zip"
      when: dotfiles_profile == 'desktop'

    - name: Setup Ollama
      ansible.builtin.include_tasks: ollama.yml
      when: ollama_enabled

    - name: Apply dconf settings
      community.general.dconf:
        key: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
      loop: "{{ dconf_settings | default([]) }}"
      when: dotfiles_profile == 'desktop'

    - name: Setup Zed
      ansible.builtin.include_tasks: zed.yml
      when: dotfiles_profile == 'desktop'

    - name: Enable x11vnc systemd user service
      ansible.builtin.systemd:
        name: x11vnc.service
        enabled: true
        scope: user
        daemon_reload: true
      when: dotfiles_profile == 'desktop'

    - name: Install Claude Code
      ansible.builtin.include_tasks: claude-code.yml

  handlers:
    - name: Load Helium AppArmor profile
      become: true
      ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/helium-appimage

    - name: Restart ollama
      become: true
      ansible.builtin.systemd:
        name: ollama
        state: restarted
        daemon_reload: true
