- name: Install Ollama
  when: ollama_enabled
  block:
    - name: Create ollama group
      become: true
      ansible.builtin.group:
        name: ollama
        system: true
        state: present

    - name: Create ollama user
      become: true
      ansible.builtin.user:
        name: ollama
        system: true
        shell: /bin/false
        home: /usr/share/ollama
        create_home: true
        group: ollama

    - name: Add ollama user to GPU access groups
      become: true
      ansible.builtin.user:
        name: ollama
        groups: render,video
        append: true

    - name: Download ollama tarball
      become: true
      ansible.builtin.get_url:
        url: "https://github.com/ollama/ollama/releases/download/v{{ ollama_version }}/ollama-linux-amd64.tar.zst"
        dest: "/tmp/ollama-{{ ollama_version }}.tar.zst"

    - name: Extract ollama to /usr
      become: true
      ansible.builtin.unarchive:
        src: "/tmp/ollama-{{ ollama_version }}.tar.zst"
        dest: /usr
        remote_src: true
        creates: "/usr/share/ollama/.version-{{ ollama_version }}"

    - name: Write version marker
      become: true
      ansible.builtin.copy:
        content: "{{ ollama_version }}"
        dest: "/usr/share/ollama/.version-{{ ollama_version }}"
      notify: Restart ollama

    - name: Create ollama systemd service
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service
        content: |
          [Unit]
          Description=Ollama Service
          After=network-online.target

          [Service]
          ExecStart=/usr/bin/ollama serve
          User=ollama
          Group=ollama
          Restart=always
          RestartSec=3
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

          [Install]
          WantedBy=default.target
      notify: Restart ollama

    - name: Enable and start ollama service
      become: true
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
        daemon_reload: true

- name: Remove Ollama
  when: not ollama_enabled
  block:
    - name: Stop and disable ollama service
      become: true
      ansible.builtin.systemd:
        name: ollama
        enabled: false
        state: stopped
      failed_when: false

    - name: Remove ollama systemd service
      become: true
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service
        state: absent

    - name: Remove ollama package
      become: true
      ansible.builtin.apt:
        name: ollama
        state: absent

    - name: Remove ollama installed files
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/bin/ollama
        - /usr/lib/ollama

    - name: Check ollama home directory
      become: true
      ansible.builtin.stat:
        path: /usr/share/ollama
      register: ollama_home

    - name: Find ollama version markers
      become: true
      ansible.builtin.find:
        paths: /usr/share/ollama
        patterns: ".version-*"
        file_type: file
      register: ollama_version_markers
      when: ollama_home.stat.exists

    - name: Remove ollama version markers
      become: true
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ ollama_version_markers.files | default([]) }}"

    - name: Reload systemd after removing ollama service
      become: true
      ansible.builtin.systemd:
        daemon_reload: true
