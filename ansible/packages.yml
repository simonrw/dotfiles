---
apt_keys:
  - url: https://mise.en.dev/gpg-key.pub
    keyring: /etc/apt/keyrings/mise-archive-keyring.asc

apt_repositories:
  - repo: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.asc arch=amd64] https://mise.en.dev/deb stable main"
    filename: mise
    managed_source_file: true
  - repo: "ppa:fish-shell/release-4"
    filename: fish-shell-release-4

packages:

  - 1password
  - 1password-cli
  - bridge-utils          # kvm
  - build-essential
  - clang-18
  - cmake
  - cpu-checker           # kvm
  - curl
  - emacs
  - eza
  - ethtool
  - fd-find
  - ffmpeg
  - fish
  - fonts-jetbrains-mono
  - git-delta
  - gnome-tweaks
  - htop
  - libcfitsio-dev
  - libclang-18-dev
  - liblua5.4-dev
  - libnss3-tools         # mkcert
  - libssl-dev
  - libvirt-clients       # kvm
  - libvirt-daemon        # kvm
  - lua5.4
  - mise
  - mosh
  - ncdu
  - podman
  - python3-psutil           # dconf module
  - qemu-system
  - ripgrep
  - socat                 # for claude sandboxing
  - sqlite3
  - stow
  - unattended-upgrades
  - virt-manager
  - wmctrl
  - x11vnc
  - zsh

snaps:

  - slack
  - steam

classic_snaps:

  - pycharm
